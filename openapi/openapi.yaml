openapi: 3.0.3
info:
  title: Casino Blackjack API
  description: REST API symulatora kasyna — gra Blackjack
  version: 0.1.0
  contact:
    name: Zespół projektowy WWW

servers:
  - url: http://localhost:8080/api/v1
    description: Lokalne środowisko deweloperskie (Spring Boot)

tags:
  - name: auth
    description: Autoryzacja i rejestracja
  - name: wallet
    description: Portfel i żetony
  - name: tables
    description: Stoły i zakłady
  - name: users
    description: Profil użytkownika

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string

    RegisterRequest:
      type: object
      required: [email, password, username]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        username:
          type: string
          minLength: 3
          maxLength: 30

    AuthResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        token:
          type: string
        expiresIn:
          type: integer
          example: 86400

    WalletResponse:
      type: object
      properties:
        balance:
          type: integer
          minimum: 0
          example: 1000
        currency:
          type: string
          example: chips

    Table:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        maxPlayers:
          type: integer
          minimum: 2
          maximum: 6
        currentPlayers:
          type: integer
        status:
          type: string
          enum: [waiting, in_game, settlement]
        minBet:
          type: integer
          minimum: 1
        maxBet:
          type: integer

    BetRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: integer
          minimum: 1

    BetResponse:
      type: object
      properties:
        betId:
          type: string
          format: uuid
        newBalance:
          type: integer

paths:
  /auth/register:
    post:
      tags: [auth]
      summary: Rejestracja gracza
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Konto utworzone
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Błąd walidacji
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email już istnieje

  /auth/login:
    post:
      tags: [auth]
      summary: Logowanie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Token JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Nieprawidłowe dane

  /auth/register-dealer:
    post:
      tags: [auth]
      summary: Rejestracja krupiera
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Konto krupiera utworzone
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /users/me:
    get:
      tags: [users]
      security:
        - bearerAuth: []
      summary: Profil zalogowanego użytkownika
      responses:
        '200':
          description: Profil użytkownika
        '401':
          description: Brak autoryzacji

  /wallet:
    get:
      tags: [wallet]
      security:
        - bearerAuth: []
      summary: Pobranie salda portfela
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletResponse'
        '401':
          description: Brak autoryzacji

  /tables:
    get:
      tags: [tables]
      summary: Lista stołów w lobby
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [waiting, in_game, settlement]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  tables:
                    type: array
                    items:
                      $ref: '#/components/schemas/Table'
    post:
      tags: [tables]
      security:
        - bearerAuth: []
      summary: Utworzenie nowego stołu
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, maxPlayers, minBet, maxBet]
              properties:
                name:
                  type: string
                maxPlayers:
                  type: integer
                minBet:
                  type: integer
                maxBet:
                  type: integer
      responses:
        '201':
          description: Stół utworzony
        '400':
          description: Błąd walidacji

  /tables/{tableId}:
    get:
      tags: [tables]
      summary: Szczegóły stołu
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Szczegóły stołu
        '404':
          description: Stół nie istnieje

  /tables/{tableId}/bets:
    post:
      tags: [tables]
      security:
        - bearerAuth: []
      summary: Postawienie zakładu
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BetRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BetResponse'
        '400':
          description: Kwota poza limitami lub salda
        '403':
          description: Brak miejsca przy stole lub zła faza gry
        '409':
          description: Zakład już postawiony w tej rundzie

  /tables/{tableId}/history:
    get:
      tags: [tables]
      summary: Historia rund stołu
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Historia rund
        '404':
          description: Stół nie istnieje

  /tables/{tableId}/join:
    post:
      tags: [tables]
      security:
        - bearerAuth: []
      summary: Dołączenie do stołu
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [seatIndex]
              properties:
                seatIndex:
                  type: integer
                asDealer:
                  type: boolean
      responses:
        '200':
          description: Dołączono do stołu
        '400':
          description: Miejsce zajęte lub błąd walidacji
        '403':
          description: Brak autoryzacji

  /tables/{tableId}/leave:
    delete:
      tags: [tables]
      security:
        - bearerAuth: []
      summary: Opuszczenie stołu
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Opuszczono stół
        '403':
          description: Brak autoryzacji

  /health:
    get:
      tags: [users]
      summary: Health check
      responses:
        '200':
          description: Serwis działa
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
